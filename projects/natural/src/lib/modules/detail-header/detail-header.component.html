<div class="breadcrumb">
    @if (rootLabel || label) {
        <a color="primary" matButton [routerLink]="isPanel() ? [] : getRootLink()" [fragment]="listFragment()">{{
            rootLabel || label
        }}</a>
    }
    @for (parent of breadcrumbs(); track parent.id) {
        /
        <a color="primary" matButton [routerLink]="isPanel() ? [] : getLink(parent.id)">
            {{ parent?.fullName || parent?.name }}</a
        >
    }
</div>

<div class="body">
    @if (icon) {
        <div style="width: 30px">
            <mat-icon [naturalIcon]="icon" />
        </div>
    }
    @if (!model().id) {
        <h1 class="newLabel">{{ newLabel() }}</h1>
    } @else {
        <h1 class="label">{{ model().name || model().fullName || label }}</h1>
    }
    <div>
        <ng-content />
    </div>
</div>
