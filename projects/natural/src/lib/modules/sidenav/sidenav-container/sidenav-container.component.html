<mat-sidenav-container>
    <mat-sidenav mode="side" [opened]="true" position="start">
        <mat-accordion displayMode="flat">
            <mat-expansion-panel [disabled]="true" [expanded]="true">
                <mat-nav-list>
                    <a mat-list-item routerLink="/">
                        <span>Home</span>
                    </a>

                    <a mat-list-item routerLink="/">
                        <span>Home</span>
                    </a>

                    <a mat-list-item routerLink="/other">
                        <span>Other page</span>
                    </a>
                </mat-nav-list>
            </mat-expansion-panel>
        </mat-accordion>
    </mat-sidenav>

    <mat-sidenav-content>
        <div fxFlex fxLayout="column" style="padding: 20px; overflow: auto">
            <router-outlet></router-outlet>
        </div>
    </mat-sidenav-content>
</mat-sidenav-container>
