<mat-sidenav-container>
    <mat-sidenav [mode]="sidenavService.activeMode" [opened]="true" position="start">
        <div style="overflow-x: auto; margin: 20px">
            <div id="menu">
                <mat-accordion displayMode="flat">
                    <mat-expansion-panel [disabled]="true" [expanded]="true" class="mat-elevation-z0">
                        <mat-nav-list>
                            <a mat-list-item routerLink="/">
                                <mat-icon mat-list-icon>home</mat-icon>
                                <span matLine>Home</span>
                            </a>

                            <a mat-list-item routerLink="/search">
                                <span matLine>Search</span>
                            </a>

                            <a [routerLink]="['/list', {dog: 'qwer'}]" mat-list-item>
                                <span matLine>List A</span>
                            </a>

                            <a
                                [routerLink]="['/nested/listParamValue', {cat: 'cat'}, 'list', {dog: 'dog'}]"
                                mat-list-item
                            >
                                <span matLine>List B</span>
                            </a>

                            <a [routerLink]="['/editable-list']" mat-list-item>
                                <span matLine>Editable list</span>
                            </a>

                            <a [routerLink]="['/navigable-list']" mat-list-item>
                                <span matLine>Navigable list</span>
                            </a>

                            <a [routerLink]="['/detail/123']" mat-list-item>
                                <span matLine>Detail</span>
                            </a>

                            <a [routerLink]="['/detail-header']" mat-list-item>
                                <span matLine>Detail header</span>
                            </a>

                            <a mat-list-item routerLink="/select">
                                <span matLine>Select</span>
                            </a>

                            <a mat-list-item routerLink="/select-hierarchic">
                                <span matLine>Select hierarchic</span>
                            </a>

                            <a mat-list-item routerLink="/select-enum">
                                <span matLine>Select Enum</span>
                            </a>

                            <a mat-list-item routerLink="/relation">
                                <span matLine>Relation</span>
                            </a>

                            <a mat-list-item routerLink="/hierarchic">
                                <span matLine>Hiérarchic</span>
                            </a>

                            <a mat-list-item routerLink="/panels">
                                <span matLine>Panels</span>
                            </a>

                            <a mat-list-item routerLink="/file">
                                <span matLine>File</span>
                            </a>

                            <a mat-list-item routerLink="/alert-service">
                                <span matLine>Alert service</span>
                            </a>

                            <a mat-list-item routerLink="/avatar">
                                <span matLine>Avatar</span>
                            </a>

                            <a mat-list-item routerLink="/other">
                                <span matLine>Other tools</span>
                            </a>
                        </mat-nav-list>
                    </mat-expansion-panel>
                </mat-accordion>
            </div>
        </div>
    </mat-sidenav>

    <mat-sidenav-content>
        <div>
            <div fxFlex fxLayout="column" style="padding: 20px; overflow: auto">
                <router-outlet></router-outlet>
            </div>
        </div>
    </mat-sidenav-content>
</mat-sidenav-container>
